spring:
  data:
    redis:
      host: 103.144.2.88
      port: 6379
      client-type: jedis
      username: default
      password: ThisIsMyRedisStack
  rabbitmq:
    host: 103.144.2.88
    port: 5672
    virtual-host: /
    username: Myuser
    password: ThisIsMyRabbit

  application:
    name: spring-ai-demo
  servlet:
    multipart:
      max-file-size: 30MB
      max-request-size: 40MB
  ai:
    vectorstore: #向量库配置
      # elasticsearch: #使用ES作为向量库存储
      #   initialize-schema: true  #开启初始化向量库结构
      #   dimensions: 1024  #向量维度维度
      redis:
        initialize-schema: true
        index-name: campusai-ai-index
        prefix: "campusai:"
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always # 自动建表
            schema: classpath:sql/schema-mysql.sql # 建表脚本
    openai: # 阿里云百炼平台兼容OpenAI，所以这里使用阿里云百炼平台地址
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      api-key: ${ALIYUN_API_KEY}
      chat:
        options:
          model: qwen-plus
      embedding:
        options:
          model: text-embedding-v3
          dimensions: 1024
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://103.144.2.88:3306/campusai?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: ThisIsMyDatabase
logging:
  level:
    com.itheima: debug
    org.springframework.ai: debug


